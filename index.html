<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALU_PRO_V22_UI_SOFTER_PRINT_BLACK</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ff00; --bg: #0d1117; }
        * { font-family: 'JetBrains Mono', monospace; box-sizing: border-box; text-transform: lowercase; color: #ffffff; font-weight: 700; }
        body { background-color: var(--bg); margin: 0; padding: 12px; }
        .container { width: 100%; max-width: 600px; margin: auto; }
        
        /* UI ပေါ်တွင် frame များကို မျက်စိမဆူးအောင် မှိန်မှိန်လေး (Light Gray) ပြုလုပ်ခြင်း */
        .glass-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr 0.8fr 1.2fr 45px; gap: 8px; margin-bottom: 15px; align-items: end; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 12px; }
        input { width: 100%; height: 45px; padding: 10px; border-radius: 6px; border: 1px solid #ccc; background: #000; font-size: 14px; outline: none; text-align: center; color: #fff; font-weight: 700; }
        .type-picker { background: #000; border: 1px solid #ccc; border-radius: 6px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; }
        .type-menu { display: none; position: absolute; top: 50px; right: 0; width: 180px; background: #1a222c; border: 1px solid #ccc; border-radius: 6px; z-index: 1000; }
        .type-menu.show { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; padding: 5px; }
        .type-option { padding: 5px; border: 1px solid #ccc; border-radius: 4px; text-align: center; background: #000; height: 45px; display: flex; align-items: center; justify-content: center; }
        .type-option svg, .selected-display svg { width: 35px; height: 25px; stroke: white; }
        .btn-sec { background: rgba(255,255,255,0.1); border: 1px solid #ccc; margin-bottom: 15px; color: #fff; }
        .add-btn { background: #0047AB; color: #fff; width: 45px; height: 45px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; border: 1px solid #ccc; }
        .del-btn { background: #b32d2d; color: #fff; width: 45px; height: 45px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #ccc; }
        th { text-align: left; font-size: 12px; color: #fff; padding-bottom: 10px; border-bottom: 2px solid #ccc; font-weight: 900; }
        td { padding: 12px 4px; font-size: 14px; border-bottom: 1px solid #777; color: #fff; font-weight: 700; }
        .total-row td { border-top: 2px solid #ccc; font-weight: 900; font-size: 18px; padding-top: 18px; color: var(--accent); }

        h2 { text-align: center; font-weight: 700; letter-spacing: 2px; padding-bottom: 10px; color: #fff; }
        label { display: block; margin-bottom: 6px; color: #fff; font-size: 11px; text-align: center; }
        .btn { padding: 16px; border-radius: 12px; border: none; cursor: pointer; width: 100%; font-weight: 900; font-size: 15px; }
        .btn-main { background: #fff; color: #000; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; }
        .num-cell { text-align: right; font-variant-numeric: tabular-nums; }

        /* PDF Print အတွက် စာလုံးများကို မဲနက်ပြီး Frame များကို မဲနက်အောင် ပြင်ဆင်ချက် (ဆရာ့အလိုကျ မမှိန်စေရန်) */
        @media print {
            body { background: white; }
            * { color: #000 !important; font-weight: 900 !important; border-color: #000 !important; }
            .btn, .add-btn, .del-btn, .type-picker, .type-menu { display: none !important; }
            .glass-card { background: none; border: 2px solid #000; }
            td, th { border-bottom: 1px solid #000 !important; }
        }
    </style>
</head>
<body>

<div id="mainPage" class="container">
    <h2>alu_pro_v22</h2>
    <button class="btn btn-sec" onclick="showPage('settingPage')">settings</button>
    <div class="glass-card">
        <div id="windowInputs"></div>
        <div style="display: flex; gap: 12px; align-items: center; margin-top: 12px;">
            <div class="add-btn" onclick="addWindow()">+</div>
            <button class="btn btn-sec" style="width: auto; margin:0; padding: 10px 20px;" onclick="clearAll()">clear all</button>
        </div>
        <button class="btn btn-main" onclick="calculate()">run_calculation</button>
    </div>
</div>

<div id="resultPage" class="container" style="display:none;">
    <h2>output_report</h2>
    <button class="btn btn-sec" onclick="showPage('mainPage')">< return</button>
    <div id="resultArea"></div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
        <button class="btn btn-main" onclick="exportExcel()">save excel (csv)</button>
        <button class="btn btn-main" onclick="window.print()">print pdf</button>
    </div>
</div>

<div id="settingPage" class="container" style="display:none;">
    <h2>price_database</h2>
    <div class="glass-card" id="priceInputs" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;"></div>
    <button class="btn btn-main" onclick="savePrices()">save_to_db</button>
</div>

<script>
    const labels = ["top frame", "btm frame", "side frame", "lock frame", "hook frame", "wheel frame", "top cap", "btm cap", "wheel", "hook lock", "weatherstrip", "glass (4x6)", "sqft labor"];
    const defaults = [150800, 200200, 105900, 98300, 98300, 104000, 570, 570, 2800, 13000, 39900, 65000, 9000];
    const icons = {
        '2L': `<svg viewBox="0 0 40 40" fill="none" stroke="white" stroke-width="3"><rect x="2" y="2" width="36" height="36"/><line x1="20" y1="2" x2="20" y2="38"/></svg>`,
        '3L': `<svg viewBox="0 0 40 40" fill="none" stroke="white" stroke-width="3"><rect x="2" y="2" width="36" height="36"/><line x1="14" y1="2" x2="14" y2="38"/><line x1="26" y1="2" x2="26" y2="38"/></svg>`,
        '4L': `<svg viewBox="0 0 40 40" fill="none" stroke="white" stroke-width="3"><rect x="2" y="2" width="36" height="36"/><line x1="11" y1="2" x2="11" y2="38"/><line x1="20" y1="2" x2="20" y2="38"/><line x1="29" y1="2" x2="29" y2="38"/></svg>`
    };

    window.onload = () => { loadSettingsUI(); addWindow(); };

    function addWindow() {
        const div = document.createElement('div');
        div.className = 'input-row';
        div.innerHTML = `
            <div><label>h</label><input type="text" class="h-in" onblur="autoFormat(this)"></div>
            <div><label>w</label><input type="text" class="w-in" onblur="autoFormat(this)"></div>
            <div><label>qty</label><input type="number" class="q-in" value=""></div>
            <div><label>type</label><div class="type-picker" onclick="toggleMenu(this)"><div class="selected-display">--</div><input type="hidden" class="t-in">
            <div class="type-menu"><div class="type-option" onclick="selectType(this,'2L')">${icons['2L']}</div><div class="type-option" onclick="selectType(this,'3L')">${icons['3L']}</div><div class="type-option" onclick="selectType(this,'4L')">${icons['4L']}</div></div></div></div>
            <div class="del-btn" onclick="removeRow(this)">x</div>`;
        document.getElementById('windowInputs').appendChild(div);
    }

    function autoFormat(el) {
        let val = el.value.trim();
        if(!val) return;
        if(/^\d+$/.test(val)) el.value = val + "'";
        else if(/^\d+\s+\d+$/.test(val)) { let parts = val.split(/\s+/); el.value = parts[0] + "' " + parts[1] + '"'; }
    }

    function parseInput(val) {
        if(!val) return 0;
        let f = val.match(/(\d+)'/), i = val.match(/(\d+)"/);
        return (f ? parseFloat(f[1]) : 0) + (i ? parseFloat(i[1])/12 : 0) || parseFloat(val) || 0;
    }

    function barLogic(pieces, price) {
        let totalAmt = 0; let totalFt = 0; let totalBarsRaw = 0;
        pieces.forEach(p => {
            let itemPrice = 0; let ratio = 0; totalFt += p;
            if (p > 10) { itemPrice = price; ratio = 1.0; }
            else if (p > 6.5) { itemPrice = price / 2; ratio = 0.5; }
            else if (p > 5)   { itemPrice = price / 3; ratio = 1/3; }
            else if (p > 4)   { itemPrice = price / 4; ratio = 1/4; }
            else if (p > 3)   { itemPrice = price / 5; ratio = 1/5; }
            else if (p > 2.5) { itemPrice = price / 6; ratio = 1/6; }
            else if (p > 2)   { itemPrice = price / 8; ratio = 1/8; }
            else if (p > 1.5) { itemPrice = price / 10; ratio = 1/10; }
            else if (p > 1)   { itemPrice = price / 13; ratio = 1/13; }
            else              { itemPrice = price / 20; ratio = 1/20; }
            totalAmt += itemPrice; totalBarsRaw += ratio;
        });
        let displayLabel = "";
        if (totalBarsRaw >= 0.5) {
            let rem = totalBarsRaw % 1; let rounded = 0;
            if (Math.abs(rem) < 0.0001) rounded = Math.round(totalBarsRaw);
            else if (rem <= 0.5) rounded = Math.floor(totalBarsRaw) + 0.5;
            else rounded = Math.ceil(totalBarsRaw);
            displayLabel = rounded + " bar";
        } else {
            displayLabel = totalFt.toFixed(1) + " ft";
        }
        return { amt: totalAmt, text: displayLabel, count: Math.ceil(totalBarsRaw) };
    }

    function getGlassSheets(w, h, totalPc) {
        const sw = 48, sh = 72; let gw = w * 12, gh = h * 12;
        let f1 = Math.floor(sw/gw) * Math.floor(sh/gh), f2 = Math.floor(sw/gh) * Math.floor(sh/gw);
        let perSheet = Math.max(f1, f2); if(perSheet <= 0) perSheet = 1;
        let raw = totalPc / perSheet;
        return (raw % 1 > 0 && raw % 1 <= 0.5) ? Math.floor(raw) + 0.5 : Math.ceil(raw);
    }

    function calculate() {
        let rows = document.querySelectorAll('.input-row'), data = [];
        rows.forEach(r => {
            let h = r.querySelector('.h-in').value, w = r.querySelector('.w-in').value, q = r.querySelector('.q-in').value, t = r.querySelector('.t-in').value;
            if(h && w && q && t) data.push({ h: parseInput(h), w: parseInput(w), q: parseInt(q), t });
        });
        if(!data.length) return alert("fill all!");
        const p = JSON.parse(localStorage.getItem('alu_v22_prices') || '{}'), getP = (i) => parseFloat(p['v'+i] || defaults[i-1]);

        let lists = { top:[], btm:[], side:[], lock:[], hook:[], wheelF:[] };
        let caps=0, wheels=0, locks=0, glassSheetsTotal=0, totalSqft=0, totalBarsUsedForWStrip=0;

        data.forEach(d => {
            totalSqft += d.h * d.w * d.q;
            let leave = parseInt(d.t[0]); let panelW = d.w / leave;
            glassSheetsTotal += getGlassSheets(panelW, d.h, leave * d.q);
            for(let i=0; i<d.q; i++) {
                lists.top.push(d.w); lists.btm.push(d.w); lists.side.push(d.h, d.h);
                let lC = (d.t === '4L' ? 4 : 2); for(let j=0; j<lC; j++) lists.lock.push(d.h);
                let hC = (d.t === '3L' ? 4 : (d.t === '4L' ? 4 : 2)); for(let j=0; j<hC; j++) lists.hook.push(d.h);
                for(let j=0; j<leave*2; j++) lists.wheelF.push(panelW);
            }
            caps += (leave * 2) * d.q; wheels += (leave * 2) * d.q; locks += (d.t === '4L' ? 3 : 2) * d.q;
        });

        let grand = 0;
        let htm = `<div class="glass-card"><table><thead><tr><th>item</th><th class="num-cell">qty</th><th class="num-cell">price</th><th class="num-cell">amount</th></tr></thead><tbody>`;
        const specs = [{n:"top frame", l:lists.top, pr:getP(1)}, {n:"btm frame", l:lists.btm, pr:getP(2)}, {n:"side frame", l:lists.side, pr:getP(3)}, {n:"lock frame", l:lists.lock, pr:getP(4)}, {n:"hook frame", l:lists.hook, pr:getP(5)}, {n:"wheel frame", l:lists.wheelF, pr:getP(6)}];

        specs.forEach(s => {
            let res = barLogic(s.l, s.pr); if(s.n === "lock frame") totalBarsUsedForWStrip = res.count;
            htm += `<tr><td>${s.n}</td><td class="num-cell">${res.text}</td><td class="num-cell">${s.pr.toLocaleString()}</td><td class="num-cell">${Math.ceil(res.amt).toLocaleString()}</td></tr>`;
            grand += res.amt;
        });

        let finalWstripFt = Math.ceil((totalBarsUsedForWStrip * 20 * 2) / 50) * 50; if(finalWstripFt === 0 && lists.lock.length > 0) finalWstripFt = 50;
        const acc = [{n:"top cap",q:caps+" pc",a:caps*getP(7),p:getP(7)}, {n:"btm cap",q:caps+" pc",a:caps*getP(8),p:getP(8)}, {n:"wheel",q:wheels+" pc",a:wheels*getP(9),p:getP(9)}, {n:"hook lock",q:locks+" pc",a:locks*getP(10),p:getP(10)}, {n:"weatherstrip",q:finalWstripFt+"'",a:(finalWstripFt/300)*getP(11),p:getP(11)}, {n:"glass total",q:glassSheetsTotal+" sht",a:glassSheetsTotal*getP(12),p:getP(12)}, {n:"labor",q:totalSqft.toFixed(2)+" sq",a:totalSqft*getP(13),p:getP(13)}];

        acc.forEach(i => { htm += `<tr><td>${i.n}</td><td class="num-cell">${i.q}</td><td class="num-cell">${i.p.toLocaleString()}</td><td class="num-cell">${Math.ceil(i.a).toLocaleString()}</td></tr>`; grand += i.a; });
        let avg = Math.ceil((grand/totalSqft) / 100) * 100;
        htm += `<tr class="total-row"><td>total amt</td><td colspan="3" class="num-cell">${Math.ceil(grand).toLocaleString()}</td></tr>`;
        htm += `<tr><td style="color:#aaa">avg/sqft</td><td colspan="3" class="num-cell" style="color:var(--accent)">${avg.toLocaleString()}</td></tr></tbody></table></div>`;
        document.getElementById('resultArea').innerHTML = htm; showPage('resultPage');
    }

    function exportExcel() {
        let csv = "Item,Qty,Price,Amount\n";
        document.querySelectorAll("#resultArea tr").forEach(tr => {
            let row = []; tr.querySelectorAll("td, th").forEach(td => row.push('"' + td.innerText.replace(/,/g, "") + '"'));
            csv += row.join(",") + "\n";
        });
        let blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob); link.setAttribute("download", "alu_report.csv");
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    function toggleMenu(el) { document.querySelectorAll('.type-menu').forEach(m => { if(m !== el.querySelector('.type-menu')) m.classList.remove('show'); }); el.querySelector('.type-menu').classList.toggle('show'); }
    function selectType(opt, val) { let p = opt.closest('.type-picker'); p.querySelector('.t-in').value = val; p.querySelector('.selected-display').innerHTML = icons[val]; }
    function removeRow(btn) { btn.parentElement.remove(); }
    function showPage(id) { document.querySelectorAll('.container').forEach(p=>p.style.display='none'); document.getElementById(id).style.display='block'; }
    function loadSettingsUI() { let h = ""; labels.forEach((l,i) => h += `<div><label>${l}</label><input type="number" id="p${i+1}" value="${defaults[i]}"></div>`); document.getElementById('priceInputs').innerHTML = h; let s = localStorage.getItem('alu_v22_prices'); if(s) { let p = JSON.parse(s); labels.forEach((_,i) => document.getElementById('p'+(i+1)).value = p['v'+(i+1)]); } }
    function savePrices() { let p = {}; labels.forEach((_,i) => p['v'+(i+1)] = document.getElementById('p'+(i+1)).value); localStorage.setItem('alu_v22_prices', JSON.stringify(p)); showPage('mainPage'); }
    function clearAll() { if(confirm("clear all?")) { document.getElementById('windowInputs').innerHTML=''; addWindow(); } }
    window.onclick = (e) => { if(!e.target.closest('.type-picker')) document.querySelectorAll('.type-menu').forEach(m => m.classList.remove('show')); }
</script>
</body>
    </html>
