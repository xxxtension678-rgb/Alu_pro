<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alu multi pro v23</title>
    <style>
        * { font-family: 'Segoe UI', sans-serif; box-sizing: border-box; font-weight: 700; text-transform: lowercase; color: #ffffff; }
        body { background: radial-gradient(circle at 20% 20%, #1e2638, #000); margin: 0; padding: 15px; min-height: 100vh; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; margin-bottom: 25px; font-size: 22px; letter-spacing: 2px; color: #00ff00; text-shadow: 0 0 10px rgba(0,255,0,0.3); }
        .input-row { display: grid; grid-template-columns: 1fr 1fr 1fr 45px; gap: 12px; margin-bottom: 15px; align-items: end; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.05); }
        label { display: block; margin-bottom: 6px; color: rgba(255,255,255,0.5); font-size: 11px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: #000; font-size: 16px; color: #00ff00; outline: none; transition: 0.3s; }
        input:focus { border-color: #00ff00; box-shadow: 0 0 10px rgba(0,255,0,0.2); }
        .btn { padding: 16px; border-radius: 18px; border: none; cursor: pointer; width: 100%; margin-top: 10px; font-size: 15px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main { background: linear-gradient(135deg, #00ff00, #00cc00); color: #000; box-shadow: 0 5px 20px rgba(0, 255, 0, 0.3); }
        .btn-sec { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .add-btn { background: #00ff00; color: #000; width: 45px; height: 45px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: 0.3s; }
        .del-btn { background: rgba(255, 77, 77, 0.2); color: #ff4d4d; width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255, 77, 77, 0.2); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 14px 10px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
        th { color: #00ff00; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
        .total-row { background: rgba(0, 255, 0, 0.05); }
        .total-row td { color: #00ff00; font-size: 18px; border-top: 2px solid #00ff00; }
        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    </style>
</head>
<body>

<div id="mainPage" class="container">
    <h2>alu multi pro v23</h2>
    <button class="btn btn-sec" style="margin-bottom: 25px;" onclick="showPage('settingPage')">⚙️ price settings</button>
    
    <div class="glass-card">
        <div id="windowInputs"></div>
        <div style="display: flex; gap: 15px; align-items: center; margin-top: 15px;">
            <div class="add-btn" onclick="addWindow()">+</div>
            <span style="font-size: 13px; color: rgba(255,255,255,0.4);">add new row</span>
            <button class="btn btn-sec" style="width: auto; margin-left: auto; padding: 10px 20px; font-size: 12px;" onclick="clearAll()">reset all</button>
        </div>
        <button class="btn btn-main" style="margin-top: 30px; font-size: 18px;" onclick="calculate()">Calculate Estimation</button>
    </div>
    
    <div id="resultArea"></div>
</div>

<div id="settingPage" class="container" style="display:none;">
    <h2>Costing Settings</h2>
    <div class="glass-card price-grid" id="priceInputs"></div>
    <button class="btn btn-main" onclick="savePrices()">Save & Continue</button>
</div>

<script>
    const labels = ["top frame", "btm frame", "side frame", "lock frame", "hook frame", "wheel frame", "top cap", "btm cap", "wheel", "hook lock", "weatherstrip", "glass (4x6)", "sqft labor"];
    const defaults = [150800, 200200, 105900, 98300, 98300, 104000, 570, 570, 2800, 13000, 39900, 65000, 9000];

    window.onload = () => {
        loadSettingsUI();
        const savedData = localStorage.getItem('alu_v23_draft');
        if (savedData) JSON.parse(savedData).forEach(d => addWindow(d.h, d.w, d.q));
        else addWindow();
    };

    function showPage(id) { 
        document.getElementById('mainPage').style.display = id === 'mainPage' ? 'block' : 'none'; 
        document.getElementById('settingPage').style.display = id === 'settingPage' ? 'block' : 'none'; 
    }

    function addWindow(h = '', w = '', q = '') {
        const div = document.createElement('div');
        div.className = 'input-row';
        div.innerHTML = `
            <div><label>H(ft)</label><input type="number" class="h-in" value="${h}" placeholder="0" oninput="saveDraft()"></div>
            <div><label>W(ft)</label><input type="number" class="w-in" value="${w}" placeholder="0" oninput="saveDraft()"></div>
            <div><label>Qty</label><input type="number" class="q-in" value="${q}" placeholder="1" oninput="saveDraft()"></div>
            <div class="del-btn" onclick="removeRow(this)">×</div>
        `;
        document.getElementById('windowInputs').appendChild(div);
        saveDraft();
    }

    function removeRow(btn) { btn.parentElement.remove(); saveDraft(); }

    function clearAll() { if(confirm("Data အကုန်ဖြတ်မှာလား ဆရာ?")) { document.getElementById('windowInputs').innerHTML = ''; addWindow(); saveDraft(); document.getElementById('resultArea').innerHTML = ''; } }

    function saveDraft() {
        const hs = document.querySelectorAll('.h-in'), ws = document.querySelectorAll('.w-in'), qs = document.querySelectorAll('.q-in');
        let data = [];
        hs.forEach((h, i) => { data.push({ h: h.value, w: ws[i].value, q: qs[i].value }); });
        localStorage.setItem('alu_v23_draft', JSON.stringify(data));
    }

    function calculate() {
        const hs = document.querySelectorAll('.h-in'), ws = document.querySelectorAll('.w-in'), qs = document.querySelectorAll('.q-in');
        let totalSqft = 0;
        hs.forEach((h, i) => { if(h.value && ws[i].value) totalSqft += parseFloat(h.value) * parseFloat(ws[i].value) * (parseInt(qs[i].value) || 1); });
        
        const p = JSON.parse(localStorage.getItem('alu_v23_prices') || '{}');
        const labor = parseFloat(p['v13'] || defaults[12]);
        let estimatedTotal = totalSqft * labor; // Simplified placeholder

        let htm = `<div class="glass-card animate-in"><table><thead><tr><th>description</th><th>total</th></tr></thead><tbody>`;
        htm += `<tr><td>Total Measurement</td><td>${totalSqft.toFixed(2)} SQFT</td></tr>`;
        htm += `<tr><td>Labor & Consumables</td><td>${(totalSqft * labor).toLocaleString()} K</td></tr>`;
        htm += `<tr class="total-row"><td>FINAL ESTIMATE</td><td>${estimatedTotal.toLocaleString()} K</td></tr></tbody></table>`;
        htm += `<button class="btn btn-sec" style="margin-top:20px;" onclick="window.print()">Download PDF Report</button></div>`;
        document.getElementById('resultArea').innerHTML = htm;
    }

    function loadSettingsUI() {
        let htm = ""; labels.forEach((l, i) => { htm += `<div><label>${l}</label><input type="number" id="p${i+1}" value="${defaults[i]}"></div>`; });
        document.getElementById('priceInputs').innerHTML = htm;
        let s = localStorage.getItem('alu_v23_prices');
        if(s) { let p = JSON.parse(s); labels.forEach((_, i) => { document.getElementById('p'+(i+1)).value = p['v'+(i+1)]; }); }
    }

    function savePrices() {
        let p = {}; labels.forEach((_, i) => { p['v'+(i+1)] = document.getElementById('p'+(i+1)).value; });
        localStorage.setItem('alu_v23_prices', JSON.stringify(p)); showPage('mainPage');
    }
</script>
</body>
</html>
